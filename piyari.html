<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duniya Ki Sab Se Piyari Larki</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #ffd6e8, #ff9ec0, #ff6fa5);
    min-height: 100vh;

    flex-direction: column;
    align-items: center;

  h1 {
    color: #fff;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.25);

  }

  #mainBtn {
    background: linear-gradient(135deg, #ff4da6, #ff1a8c);

    border-radius: 50px;
    padding: 22px 30px;
    font-size: 1.15rem;
    font-weight: bold;
    box-shadow: 0 8px 20px rgba(255, 20, 140, 0.5);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    max-width: 360px;
    text-align: center;
    animation: pulse 1.6s infinite;
  }

  #mainBtn:active {
    transform: scale(0.95);
  }

  @keyframes pulse {
    0%   { box-shadow: 0 8px 20px rgba(255, 20, 140, 0.5); }
    50%  { box-shadow: 0 8px 30px rgba(255, 20, 140, 0.9); }
    100% { box-shadow: 0 8px 20px rgba(255, 20, 140, 0.5); }
  }

  #cameraWrap {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    position: relative;
    width: 100%;
    max-width: 420px;
  }

  #videoBox {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    border: 5px solid #fff;
    background: #000;
  }

  video, canvas#snapCanvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror selfie view */
  }

  canvas#overlayCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;

  }

  #statusText {
    margin-top: 14px;

    font-weight: bold;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.3);

  }

  #resultWrap {
    display: none;
    margin-top: 20px;
    width: 100%;
    max-width: 420px;
    flex-direction: column;
    align-items: center;
  }

  #resultBox {
    position: relative;
    width: 100%;
    border-radius: 25px;

    box-shadow: 0 10px 35px rgba(0,0,0,0.4);

  }

  #resultBox img {
    width: 100%;

  }

  .badge {
    position: absolute;

  .heart {

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(0.6) rotate(0deg); }

  }

  @keyframes bounceIn {
    0%   { transform: translateY(-20px) scale(0.5); opacity: 0; }

    100% { transform: translateY(0) scale(1); opacity: 1; }

  .sparkle {
    position: absolute;

    animation: sparkleAnim 1.2s ease-in-out infinite;
  }

  @keyframes sparkleAnim {
    0%, 100% { opacity: 0.2; transform: scale(0.7) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(20deg); }
  }

  #retryBtn {

    border-radius: 40px;

  }

  .frame-corner {
    position: absolute;
    width: 30px;
    height: 30px;
    border: 4px solid #ffd700;
  }

  #closeCamBtn {
    margin-top: 14px;
    background: rgba(255,255,255,0.85);
    color: #ff1a8c;
    border: none;
    border-radius: 40px;
    padding: 10px 22px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>👑 Duniya Ki Sab Se Piyari Larki Dekhne Ke Liye Idhar Click Kare 👑</h1>

<button id="mainBtn">💖 Duniya Ki Sab Se Piyari Larki Ko Dekhne Ke Liye Idhar Click Kare 💖</button>

<div id="cameraWrap">
  <div id="videoBox">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
  </div>
  <div id="statusText">Camera khul rahi hai...</div>
  <button id="closeCamBtn">Band Kare</button>
</div>

<div id="resultWrap">
  <div id="resultBox">
    <div class="badge">✨ Piyari! ✨</div>
    <img id="resultImg" src="" alt="Piyari Larki">
  </div>
  <button id="retryBtn">🔄 Dobara Dekhna Hai</button>
</div>

<canvas id="snapCanvas" style="display:none;"></canvas>

<script>
const mainBtn = document.getElementById('mainBtn');
const cameraWrap = document.getElementById('cameraWrap');
const video = document.getElementById('video');
const overlayCanvas = document.getElementById('overlayCanvas');
const statusText = document.getElementById('statusText');
const closeCamBtn = document.getElementById('closeCamBtn');
const resultWrap = document.getElementById('resultWrap');
const resultImg = document.getElementById('resultImg');
const resultBox = document.getElementById('resultBox');
const retryBtn = document.getElementById('retryBtn');
const snapCanvas = document.getElementById('snapCanvas');

let stream = null;
let detectInterval = null;
let captured = false;
let faceDetector = null;

// Try native FaceDetector API (Chrome/Android par available, sab browsers support nahi karte)
if ('FaceDetector' in window) {
  try {
    faceDetector = new FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
  } catch (e) {
    faceDetector = null;
  }
}

mainBtn.addEventListener('click', async () => {
  resultWrap.style.display = 'none';
  cameraWrap.style.display = 'flex';
  mainBtn.style.display = 'none';
  captured = false;
  statusText.textContent = 'Camera khul rahi hai...';

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      overlayCanvas.width = video.videoWidth;
      overlayCanvas.height = video.videoHeight;
      statusText.textContent = 'Apna chehra camera ke samne rakhe... 😊';
      startDetectionLoop();
    };
  } catch (err) {
    statusText.textContent = 'Camera nahi khul saki: ' + err.message;
  }
});

closeCamBtn.addEventListener('click', () => {
  stopEverything();
  cameraWrap.style.display = 'none';
  mainBtn.style.display = 'inline-block';
});

retryBtn.addEventListener('click', () => {
  resultWrap.style.display = 'none';
  mainBtn.style.display = 'inline-block';
  mainBtn.click();
});

function stopEverything() {
  if (detectInterval) clearInterval(detectInterval);
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

function startDetectionLoop() {
  let frameCount = 0;
  detectInterval = setInterval(async () => {
    if (captured || !stream) return;
    frameCount++;

    let faceFound = false;

    if (faceDetector) {
      try {
        const faces = await faceDetector.detect(video);
        if (faces.length > 0) {
          faceFound = true;
          drawFaceBox(faces[0].boundingBox);
        } else {
          clearOverlay();
        }
      } catch (e) {
        // detector fail hua to fallback
        faceFound = frameCount > 12; // ~3 sec baad fallback se capture
      }
    } else {
      // Fallback: agar browser FaceDetector support nahi karta,
      // to thoda time de kar (face frame me aane ke liye) auto-capture kar dete hain
      faceFound = frameCount > 12; // ~3 second @ 250ms interval
      statusText.textContent = 'Chehra camera ke beech me rakhe... ' + Math.max(0, 4 - Math.floor(frameCount/4)) + 's';
    }

    if (faceFound && !captured) {
      captured = true;
      statusText.textContent = 'Piyari mil gayi! 📸';
      setTimeout(() => capturePhoto(), 500);
    }
  }, 250);
}

function drawFaceBox(box) {
  const ctx = overlayCanvas.getContext('2d');
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  ctx.strokeStyle = '#ff1a8c';
  ctx.lineWidth = 4;
  // mirror x because video is mirrored visually
  const mirroredX = overlayCanvas.width - box.x - box.width;
  ctx.strokeRect(mirroredX, box.y, box.width, box.height);
  ctx.font = 'bold 16px sans-serif';
  ctx.fillStyle = '#ff1a8c';
  ctx.fillText('Piyari 💖', mirroredX, box.y - 8);
}

function clearOverlay() {
  const ctx = overlayCanvas.getContext('2d');
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
}

function capturePhoto() {
  const w = video.videoWidth;
  const h = video.videoHeight;
  snapCanvas.width = w;
  snapCanvas.height = h;
  const ctx = snapCanvas.getContext('2d');
  // mirror capture so it matches what user sees in selfie view
  ctx.translate(w, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, w, h);

  const dataUrl = snapCanvas.toDataURL('image/png');
  resultImg.src = dataUrl;

  stopEverything();
  cameraWrap.style.display = 'none';
  resultWrap.style.display = 'flex';

  addDecorations();
}

function addDecorations() {
  // purane hearts/sparkles hata do
  document.querySelectorAll('.heart, .sparkle').forEach(el => el.remove());

  const heartsEmojis = ['💖','💕','✨','🌸','💗'];
  for (let i = 0; i < 14; i++) {
    const span = document.createElement('span');
    span.className = 'heart';
    span.textContent = heartsEmojis[Math.floor(Math.random()*heartsEmojis.length)];
    span.style.left = Math.random() * 100 + '%';
    span.style.bottom = (Math.random() * 20) + 'px';
    span.style.animationDelay = (Math.random() * 1.5) + 's';
    resultBox.appendChild(span);
  }

  for (let i = 0; i < 6; i++) {
    const span = document.createElement('span');
    span.className = 'sparkle';
    span.textContent = '✨';
    span.style.left = Math.random() * 95 + '%';
    span.style.top = Math.random() * 90 + '%';
    span.style.animationDelay = (Math.random() * 1.2) + 's';
    resultBox.appendChild(span);
  }
}
</script>

</body>
</html>
