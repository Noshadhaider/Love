<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Duniya Ki Sab Se Piyari Larki</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff6ec7 0%, #ff9a9e 35%, #fad0c4 65%, #ffecd2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Nastaliq Urdu', serif;
      overflow: hidden;
    }

    .hearts-bg { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
    .heart { position:absolute; bottom:-50px; animation: floatUp linear infinite; opacity:0.65; }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity:0.65; }
      100% { transform: translateY(-110vh) rotate(25deg); opacity:0; }
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.38);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 32px;
      padding: 44px 34px 40px;
      max-width: 400px;
      width: 92%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(255,100,160,0.28);
    }

    .emoji-top {
      font-size: 3rem; margin-bottom: 14px; display: block;
      animation: bounce 1.8s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    h1 { font-size: 1.35rem; color: #8b1a5a; line-height: 2.1; margin-bottom: 26px; }

    .main-btn {
      background: linear-gradient(135deg, #f953c6, #b91d73);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 17px 28px;
      font-size: 1rem;
      font-family: 'Noto Nastaliq Urdu', serif;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(185,29,115,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      direction: rtl;
      line-height: 2;
    }
    .main-btn:hover  { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(185,29,115,0.5); }
    .main-btn:active { transform: scale(0.97); }

    /* ---- REVEAL SECTION ---- */
    #revealSection { display: none; animation: fadeIn 0.6s ease; }
    @keyframes fadeIn {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Mirror box — canvas based */
    #mirrorCanvas {
      width: 100%;
      border-radius: 22px;
      border: 3px solid rgba(255,255,255,0.75);
      box-shadow: 0 8px 32px rgba(255,100,160,0.3);
      display: block;
      margin-bottom: 18px;
      background: #ffe0f0;
    }

    /* Fallback card when camera blocked */
    #fallbackBox {
      display: none;
      background: linear-gradient(135deg, #fff0f8, #ffe4f3);
      border: 2px dashed #f953c6;
      border-radius: 22px;
      padding: 30px 20px;
      margin-bottom: 18px;
    }
    .mirror-emoji { font-size: 5rem; margin-bottom: 10px; display: block;
      animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.12); }
    }

    .piyari-box {
      background: linear-gradient(135deg, rgba(249,83,198,0.15), rgba(255,255,255,0.3));
      border: 1.5px solid rgba(249,83,198,0.3);
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 16px;
    }
    .piyari-title { font-size: 1.3rem; color: #8b1a5a; line-height: 2.1; margin-bottom: 4px; }
    .piyari-sub   { font-size: 0.88rem; color: #c2547a; line-height: 2; }

    .close-btn {
      background: transparent;
      border: 2px solid #f953c6;
      color: #b91d73;
      border-radius: 50px;
      padding: 10px 28px;
      font-size: 0.88rem;
      font-family: 'Noto Nastaliq Urdu', serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .close-btn:hover { background: rgba(249,83,198,0.12); }
  </style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="card">

  <!-- Welcome -->
  <div id="welcomeSection">
    <span class="emoji-top">🌸💖</span>
    <h1>ذرا رُکو… کچھ خاص دیکھنا ہے؟</h1>
    <button class="main-btn" onclick="startReveal()">
      💖 دنیا کی سب سے پیاری لڑکی کو دیکھنے کے لیے یہاں کلک کریں
    </button>
  </div>

  <!-- Reveal -->
  <div id="revealSection">

    <!-- Camera canvas (mirrored) -->
    <canvas id="mirrorCanvas" height="300"></canvas>

    <!-- Fallback if camera blocked -->
    <div id="fallbackBox">
      <span class="mirror-emoji">🪞</span>
      <p style="font-size:1.1rem; color:#8b1a5a; line-height:2;">
        یہ آئینہ آپ کے لیے ہے 💖<br/>اس میں دیکھیں — وہی ہے جو آپ ہیں!
      </p>
    </div>

    <div class="piyari-box">
      <p class="piyari-title">✨ پیاری مطلب آپ! 💖</p>
      <p class="piyari-sub">
        دنیا میں آپ سے خوبصورت اور کوئی نہیں 🌸<br/>
        آپ کی مسکراہٹ سب سے پیاری ہے 😊
      </p>
    </div>

    <button class="close-btn" onclick="stopReveal()">← واپس جائیں</button>
  </div>

</div>

<script>
  let stream = null;
  let animFrame = null;

  // Floating hearts
  const bg = document.getElementById('heartsBg');
  ['💖','💕','🌸','✨','💗','🌺','💓','⭐','🌟'].forEach((e, i) => {
    for (let j = 0; j < 2; j++) {
      const h = document.createElement('span');
      h.classList.add('heart');
      h.textContent = e;
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      h.style.animationDuration = (7 + Math.random() * 8) + 's';
      h.style.animationDelay = (Math.random() * 8) + 's';
      bg.appendChild(h);
    }
  });

  async function startReveal() {
    document.getElementById('welcomeSection').style.display = 'none';
    document.getElementById('revealSection').style.display = 'block';

    const canvas = document.getElementById('mirrorCanvas');
    const ctx = canvas.getContext('2d');

    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
      const video = document.createElement('video');
      video.srcObject = stream;
      video.autoplay = true;
      video.playsInline = true;

      video.addEventListener('loadedmetadata', () => {
        canvas.width  = video.videoWidth  || 320;
        canvas.height = video.videoHeight || 300;
        canvas.style.display = 'block';
        document.getElementById('fallbackBox').style.display = 'none';
        drawMirror(video, canvas, ctx);
      });
    } catch (err) {
      // Camera blocked (file:// or permission denied) — show fallback
      canvas.style.display = 'none';
      document.getElementById('fallbackBox').style.display = 'block';
    }
  }

  function drawMirror(video, canvas, ctx) {
    ctx.save();
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.restore();
    animFrame = requestAnimationFrame(() => drawMirror(video, canvas, ctx));
  }

  function stopReveal() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    if (stream)    { stream.getTracks().forEach(t => t.stop()); stream = null; }
    const canvas = document.getElementById('mirrorCanvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('fallbackBox').style.display = 'none';
    canvas.style.display = 'block';
    document.getElementById('revealSection').style.display = 'none';
    document.getElementById('welcomeSection').style.display = 'block';
  }
</script>
</body>
</html>
